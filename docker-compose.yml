version: "3.9"

services:
  plexharmony:
    image: ghcr.io/keally1123/plexharmony:latest
    # Or build locally:
    # build: .
    container_name: plexharmony
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ── Required ──────────────────────────────────────────────
      PLEX_URL: "${PLEX_URL:-http://192.168.1.100:32400}"
      PLEX_TOKEN: "${PLEX_TOKEN}"
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH}"

      # ── Recommended ───────────────────────────────────────────
      SECRET_KEY: "${SECRET_KEY}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      PLEX_MUSIC_LIBRARY: "${PLEX_MUSIC_LIBRARY:-Music}"
      LASTFM_API_KEY: "${LASTFM_API_KEY:-}"

      # ── Tagging Tools (optional) ──────────────────────────────
      BEETS_URL: "${BEETS_URL:-}"
      MUSICBRAINZ_URL: "${MUSICBRAINZ_URL:-}"
      PICARD_URL: "${PICARD_URL:-}"

      # ── Security ──────────────────────────────────────────────
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:8000}"
      FORCE_HTTPS: "${FORCE_HTTPS:-false}"

    volumes:
      # Persist user settings and themes across container restarts
      - plexharmony_data:/app/data

    networks:
      - plexharmony_net

    read_only: true
    tmpfs:
      - /tmp
      - /app/data  # writable for settings file

    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  plexharmony_data:
    driver: local
    # For TrueNAS: map to a dataset path instead:
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /mnt/tank/appdata/plexharmony/data

networks:
  plexharmony_net:
    driver: bridge
